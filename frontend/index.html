<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2A Database Orchestrator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
        <h1>A2A Orchestrator</h1>
      </div>
      <div class="sidebar-content" id="query-list">
        <div class="empty-state">
          <p class="empty-title">No queries yet</p>
          <p class="empty-sub">Submit a query to get started</p>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <button class="menu-btn" id="menu-btn" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="main-scroll" id="main-scroll">
        <div class="content-area" id="content-area">
          <div class="welcome">
            <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
            <h2>A2A Database Orchestrator</h2>
            <p>Submit a query below or select one from the sidebar</p>
          </div>
        </div>
      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <form id="query-form" class="input-form">
          <textarea
            id="query-input"
            placeholder="Enter a database query… e.g. 'Show all tables' or 'Insert a new user'"
            maxlength="2000"
            rows="2"
          ></textarea>
          <button type="submit" id="submit-btn" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send
          </button>
        </form>
      </div>
    </main>
  </div>

  <!-- Backdrop for mobile sidebar -->
  <div class="backdrop" id="backdrop"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/static/app.js"></script>
</body>
</html>
