services:
  orchestrator:
    build: .
    command: ["python", "-m", "agents.orchestrator_agent"]
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_MODE: "a2a"
      DATABASE_AGENT_URL: "http://db-agent:8001/"
    depends_on:
      - db-agent
    restart: unless-stopped

  db-agent:
    build: .
    command: ["python", "-m", "agents.db_agent"]
    env_file: .env
    ports:
      - "8001:8001"
    restart: unless-stopped
