services:
  orchestrator:
    build: .
    command: ["python", "-m", "agents.orchestrator_agent"]
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_MODE: "direct"
    restart: unless-stopped

  # Optional: run the DB agent as a separate A2A service
  # Uncomment and set DATABASE_MODE=a2a on orchestrator to use
  # db-agent:
  #   build: .
  #   command: ["python", "-m", "agents.db_agent"]
  #   env_file: .env
  #   ports:
  #     - "8001:8001"
  #   restart: unless-stopped
